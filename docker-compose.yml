version: '3.8'

services:

  # --- Redis (local cache + session) ---
  redis:
    image: redis:7-alpine
    container_name: atomquest-redis
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # --- RabbitMQ (event bus for notifications + emails) ---
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: atomquest-rabbitmq
    ports:
      - "5672:5672"     # AMQP
      - "15672:15672"   # Management UI → http://localhost:15672 (guest/guest)
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  # --- Backend (Spring Boot — connects to Neon DB via .env) ---
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: atomquest-backend
    ports:
      - "8080:8080"
    env_file:
      - .env          # Reads from d:\atomquest\.env
    environment:
      # Ensure services point to docker network names in container mode
      REDIS_HOST: redis
      RABBITMQ_HOST: rabbitmq
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  # --- Frontend (React + Nginx) ---
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: atomquest-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  redis_data:
  rabbitmq_data:
